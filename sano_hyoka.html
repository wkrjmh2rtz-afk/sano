<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佐野クラブ 男子 選手評価</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@700&display=swap');
  :root{--navy:#0a1628;--navy2:#132040;--gold:#f5a623;--gold2:#ffc84a;--red:#e63946;--green:#2dc653;--blue:#3a86ff;--gray:#8899aa;--light:#e8f0f8;--white:#ffffff;--card:#162035;--border:#1e3050;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;padding:0 0 80px;}
  header{background:linear-gradient(135deg,var(--navy2),#0d1e38);border-bottom:3px solid var(--gold);padding:16px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5);}
  .header-top{display:flex;align-items:center;gap:12px;}
  .header-bottom{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .logo{width:44px;height:44px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--navy);flex-shrink:0;}
  .header-title h1{font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);}
  .header-title p{font-size:11px;color:var(--gray);margin-top:2px;}
  .section{display:none;padding:16px;}.section.active{display:block;}
  .player-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .player-bar label{font-size:12px;color:var(--gray);}
  select,input[type=text],input[type=date]{background:var(--card);border:1px solid var(--border);color:var(--white);padding:8px 12px;border-radius:8px;font-size:13px;font-family:inherit;}
  select:focus,input:focus{outline:2px solid var(--gold);}
  .mode-toggle{display:flex;gap:6px;margin-left:auto;}
  .mode-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;background:var(--navy);color:var(--gray);transition:all .2s;}
  .mode-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
  .category-block{background:var(--card);border-radius:12px;margin-bottom:14px;overflow:hidden;border:1px solid var(--border);}
  .category-header{display:flex;align-items:center;gap:8px;padding:10px 14px;font-weight:700;font-size:14px;}
  .cat-defense{background:linear-gradient(90deg,#1a3a5c,var(--card));border-left:4px solid var(--blue);}
  .cat-offense{background:linear-gradient(90deg,#2a1a1a,var(--card));border-left:4px solid var(--red);}
  .cat-attitude{background:linear-gradient(90deg,#1a2a1a,var(--card));border-left:4px solid var(--green);}
  .eval-grid{display:grid;gap:1px;background:var(--border);}
  .eval-row{display:flex;align-items:center;background:var(--navy);padding:10px 14px;gap:10px;}
  .eval-label{font-size:12px;flex:1;color:var(--light);}
  .eval-label small{display:block;font-size:10px;color:var(--gray);margin-top:2px;}
  .score-btns{display:flex;gap:4px;}
  .score-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;background:var(--navy2);color:var(--gray);display:flex;align-items:center;justify-content:center;}
  .score-btn:hover{transform:scale(1.1);}
  .score-btn.sel-maru-maru{background:#7c3aed;color:#fff;border-color:#7c3aed;box-shadow:0 0 8px #7c3aed88;}
  .score-btn.sel-maru{background:var(--gold);color:var(--navy);border-color:var(--gold);box-shadow:0 0 8px var(--gold)88;}
  .score-btn.sel-sankaku{background:#60a5fa;color:var(--navy);border-color:#60a5fa;}
  .score-btn.sel-batsu{background:var(--red);color:#fff;border-color:var(--red);}
  .score-summary{background:var(--card);border-radius:12px;padding:14px;margin-top:16px;border:1px solid var(--border);}
  .score-summary h3{font-size:13px;color:var(--gray);margin-bottom:12px;}
  .score-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .score-name{font-size:12px;width:80px;color:var(--light);}
  .score-bar-wrap{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
  .score-bar{height:100%;border-radius:5px;transition:width .4s;}
  .bar-def{background:linear-gradient(90deg,var(--blue),#60a5fa);}
  .bar-off{background:linear-gradient(90deg,var(--red),#f87171);}
  .bar-att{background:linear-gradient(90deg,var(--green),#4ade80);}
  .bar-total{background:linear-gradient(90deg,var(--gold),var(--gold2));}
  .score-pct{font-size:13px;font-weight:700;width:40px;text-align:right;color:var(--gold);}
  textarea{width:100%;background:var(--navy2);border:1px solid var(--border);color:var(--white);border-radius:8px;padding:10px;font-size:12px;font-family:inherit;resize:vertical;min-height:70px;margin-top:10px;}
  textarea:focus{outline:2px solid var(--gold);}
  .save-btn{width:100%;padding:14px;background:linear-gradient(90deg,var(--gold),var(--gold2));color:var(--navy);border:none;border-radius:10px;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;margin-top:14px;letter-spacing:1px;box-shadow:0 4px 15px rgba(245,166,35,.3);}
  .save-btn:active{transform:scale(.97);}
  .save-html-btn{width:100%;padding:12px;background:var(--navy2);color:var(--gold);border:2px solid var(--gold);border-radius:10px;font-size:13px;font-weight:900;font-family:inherit;cursor:pointer;margin-top:10px;letter-spacing:1px;}
  .save-html-btn:active{transform:scale(.97);}
  .history-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
  .history-filters label{font-size:12px;color:var(--gray);}
  .table-wrap{overflow-x:auto;border-radius:10px;}
  table{width:100%;border-collapse:collapse;font-size:11px;min-width:520px;}
  thead tr{background:var(--navy2);}
  th{padding:8px 10px;text-align:center;color:var(--gray);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);background:var(--card);}
  tr:hover td{background:var(--navy2);}
  .chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
  .chip-practice{background:#1e3a5f;color:#60a5fa;}.chip-game{background:#3a1e1e;color:#f87171;}
  .pct-cell{font-weight:700;}.pct-hi{color:#4ade80;}.pct-mid{color:var(--gold);}.pct-lo{color:var(--red);}
  .del-btn{background:none;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:3px 7px;font-size:10px;cursor:pointer;}
  .ranking-list{display:flex;flex-direction:column;gap:8px;}
  .rank-item{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:10px;padding:12px 14px;border:1px solid var(--border);}
  .rank-no{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;width:32px;text-align:center;color:var(--gray);}
  .rank-no.gold{color:var(--gold);}.rank-no.silver{color:#c0c0c0;}.rank-no.bronze{color:#cd7f32;}
  .rank-info{flex:1;}.rank-name{font-size:15px;font-weight:700;}.rank-sub{font-size:10px;color:var(--gray);margin-top:2px;}
  .rank-score{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;color:var(--gold);}
  .rank-score span{font-size:12px;color:var(--gray);}
  canvas{width:100%!important;max-width:300px;display:block;margin:0 auto;}
  .radar-wrap{background:var(--card);border-radius:12px;padding:16px;margin-top:12px;border:1px solid var(--border);}
  .player-list-grid{display:flex;flex-direction:column;gap:8px;}
  .player-card{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:10px;padding:10px 14px;border:1px solid var(--border);}
  .player-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:14px;flex-shrink:0;}
  .player-card-name{font-size:14px;font-weight:700;flex:1;}.player-card-grade{font-size:11px;color:var(--gray);}
  .add-player-form{display:flex;gap:8px;flex-wrap:wrap;background:var(--card);border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid var(--border);}
  .add-player-form input,.add-player-form select{flex:1;min-width:120px;}
  .add-btn{padding:8px 18px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;}
  .edit-btn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:3px 7px;font-size:10px;cursor:pointer;margin-right:4px;}
  .player-edit-form{display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1;}
  .player-edit-form input{flex:1;min-width:100px;padding:5px 8px;font-size:12px;}
  .player-edit-form select{padding:5px 6px;font-size:12px;}
  .save-edit-btn{padding:5px 10px;background:var(--gold);color:var(--navy);border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}
  .cancel-edit-btn{padding:5px 10px;background:none;color:var(--gray);border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:var(--navy);padding:10px 22px;border-radius:20px;font-weight:700;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--navy2);border-top:1px solid var(--border);display:flex;z-index:100;}
  .nav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;color:var(--gray);font-size:9px;font-family:inherit;}
  .nav-btn.active{color:var(--gold);}.nav-btn .icon{font-size:20px;}
  .legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--gray);}
  .leg-dot{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
  .empty-msg{text-align:center;color:var(--gray);padding:30px;font-size:13px;}
  .section-title{font-size:13px;color:var(--gray);margin-bottom:10px;font-weight:700;letter-spacing:1px;}
  .export-btn{padding:8px 16px;background:var(--navy2);color:var(--gold);border:1px solid var(--gold);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">佐野</div>
    <div class="header-title">
      <h1>SANO CLUB 男子</h1>
      <p>ミニバス 選手評価システム</p>
    </div>
  </div>
  <div class="header-bottom">
    <input type="text" id="coachName" placeholder="担当コーチ名" style="max-width:160px;background:var(--navy);border:1px solid var(--border);">
  </div>
</header>

<div id="sec-eval" class="section active">
  <div class="player-bar">
    <label>選手</label><select id="evalPlayer"></select>
    <input type="date" id="evalDate">
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('practice',this)">🏋️練習</button>
      <button class="mode-btn" onclick="setMode('game',this)">🏀試合</button>
    </div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#7c3aed;color:#fff">◎</div>かなりできた(3点)</div>
    <div class="leg"><div class="leg-dot" style="background:var(--gold);color:var(--navy)">○</div>できた(2点)</div>
    <div class="leg"><div class="leg-dot" style="background:#60a5fa;color:var(--navy)">△</div>意識あり(1点)</div>
    <div class="leg"><div class="leg-dot" style="background:var(--red);color:#fff">×</div>できてない(0点)</div>
  </div>
  <div class="category-block"><div class="category-header cat-defense">🛡 ディフェンス</div><div class="eval-grid" id="grid-defense"></div></div>
  <div class="category-block"><div class="category-header cat-offense">🏀 オフェンス</div><div class="eval-grid" id="grid-offense"></div></div>
  <div class="category-block"><div class="category-header cat-attitude">🔥 姿勢・メンタル</div><div class="eval-grid" id="grid-attitude"></div></div>
  <div class="score-summary">
    <h3>📊 今回のスコア</h3>
    <div class="score-row"><div class="score-name">🛡 ディフェンス</div><div class="score-bar-wrap"><div class="score-bar bar-def" id="bar-def" style="width:0%"></div></div><div class="score-pct" id="pct-def">--</div></div>
    <div class="score-row"><div class="score-name">🏀 オフェンス</div><div class="score-bar-wrap"><div class="score-bar bar-off" id="bar-off" style="width:0%"></div></div><div class="score-pct" id="pct-off">--</div></div>
    <div class="score-row"><div class="score-name">🔥 姿勢</div><div class="score-bar-wrap"><div class="score-bar bar-att" id="bar-att" style="width:0%"></div></div><div class="score-pct" id="pct-att">--</div></div>
    <div class="score-row" style="margin-top:6px"><div class="score-name" style="font-weight:700;color:var(--gold)">⭐ 総合</div><div class="score-bar-wrap"><div class="score-bar bar-total" id="bar-total" style="width:0%"></div></div><div class="score-pct" id="pct-total">--</div></div>
  </div>
  <textarea id="evalComment" placeholder="コーチコメント（良かった点・改善ポイントなど）"></textarea>
  <button class="save-btn" onclick="saveEval()">💾 評価を記録する</button>
  <button class="save-html-btn" onclick="saveHTML()">📥 データを保存する（HTMLダウンロード）</button>
</div>

<div id="sec-history" class="section">
  <p class="section-title">📋 評価履歴</p>
  <div class="history-filters">
    <label>選手</label><select id="histPlayer"><option value="">全員</option></select>
    <label>種別</label>
    <select id="histMode"><option value="">すべて</option><option value="practice">練習</option><option value="game">試合</option></select>
    <button class="export-btn" onclick="exportCSV()">📥 CSV</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>日付</th><th>選手</th><th>種別</th><th>担当</th><th>🛡守</th><th>🏀攻</th><th>🔥姿</th><th>総合</th><th></th></tr></thead>
      <tbody id="histBody"></tbody>
    </table>
  </div>
  <div id="histEmpty" class="empty-msg" style="display:none">データがありません</div>
  <button class="save-html-btn" onclick="saveHTML()" style="margin-top:14px">📥 データを保存する（HTMLダウンロード）</button>
</div>

<div id="sec-rank" class="section">
  <p class="section-title">🏆 ランキング</p>
  <div class="history-filters">
    <select id="rankMode"><option value="">すべて</option><option value="practice">練習のみ</option><option value="game">試合のみ</option></select>
    <select id="rankCat"><option value="total">総合</option><option value="defense">ディフェンス</option><option value="offense">オフェンス</option><option value="attitude">姿勢</option></select>
  </div>
  <div class="ranking-list" id="rankList"></div>
  <div class="radar-wrap">
    <p class="section-title">📡 レーダーチャート</p>
    <select id="radarPlayer" onchange="drawRadar()" style="margin-bottom:12px;width:100%"></select>
    <canvas id="radarCanvas" width="300" height="300"></canvas>
  </div>
</div>

<div id="sec-players" class="section">
  <p class="section-title">👤 選手管理</p>
  <div class="add-player-form">
    <input type="text" id="newName" placeholder="名前（例：山田 太郎）">
    <select id="newGrade"><option value="1">1年生</option><option value="2">2年生</option><option value="3">3年生</option><option value="4">4年生</option><option value="5">5年生</option><option value="6">6年生</option></select>
    <button class="add-btn" onclick="addPlayer()">＋追加</button>
  </div>
  <div class="player-list-grid" id="playerList"></div>
  <button class="save-html-btn" onclick="saveHTML()" style="margin-top:14px">📥 データを保存する（HTMLダウンロード）</button>
</div>

<div id="sec-settings" class="section">
  <p class="section-title">⚙️ 評価項目の設定</p>
  <div id="itemSettingsWrap"></div>
  <div class="score-summary" style="margin-top:16px">
    <h3 style="margin-bottom:12px">➕ 項目を追加</h3>
    <select id="newItemCat" style="width:100%;margin-bottom:8px"><option value="defense">🛡 ディフェンス</option><option value="offense">🏀 オフェンス</option><option value="attitude">🔥 姿勢</option></select>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input type="text" id="newItemLabel" placeholder="項目名" style="flex:1;min-width:140px">
      <input type="text" id="newItemHint" placeholder="説明（省略可）" style="flex:1;min-width:120px">
    </div>
    <button class="add-btn" style="width:100%;margin-top:10px" onclick="addItem()">＋ 追加する</button>
  </div>
  <button class="save-html-btn" onclick="saveHTML()" style="margin-top:14px">📥 データを保存する（HTMLダウンロード）</button>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showSection('eval',this)"><span class="icon">📝</span>入力</button>
  <button class="nav-btn" onclick="showSection('history',this)"><span class="icon">📋</span>履歴</button>
  <button class="nav-btn" onclick="showSection('rank',this)"><span class="icon">🏆</span>ランキング</button>
  <button class="nav-btn" onclick="showSection('players',this)"><span class="icon">👤</span>選手</button>
  <button class="nav-btn" onclick="showSection('settings',this)"><span class="icon">⚙️</span>設定</button>
</nav>
<div class="toast" id="toast"></div>

<!-- 埋め込みデータ -->
<script id="embedded-data" type="application/json">
__EMBEDDED_DATA__
</script>

<script>
const DEFAULT_ITEMS={
  defense:[
    {key:'d_onearm',label:'ワンアーム距離',hint:'手一本分の間隔',active:true},
    {key:'d_tinai',label:'ティナイ',hint:'ボールマンへのプレッシャー',active:true},
    {key:'d_help',label:'ヘルプ位置',hint:'正しいヘルプポジション',active:true},
    {key:'d_rotation',label:'ローテーション',hint:'ヘルプ後の戻り・連動',active:true},
    {key:'d_boxout',label:'ボックスアウト',hint:'リバウンド前のブロックアウト',active:true},
    {key:'d_first',label:'1歩目の反応',hint:'オフェンスへの素早い反応',active:true},
    {key:'d_voice',label:'声（コミュニケーション）',hint:'スクリーン・ヘルプの声かけ',active:true},
  ],
  offense:[
    {key:'o_passrun',label:'パス＆ラン',hint:'パス後すぐ動けるか',active:true},
    {key:'o_lookaround',label:'周りを見る',hint:'ドライブ前・受け取り前の視野',active:true},
    {key:'o_nodive',label:'突っ込まない判断',hint:'無謀なドライブを避ける',active:true},
    {key:'o_nearshot',label:'リング近いシュート選択',hint:'確率の高いシュートを選べるか',active:true},
    {key:'o_awase',label:'合わせ',hint:'ドライブへの合わせ・カット',active:true},
    {key:'o_spacing',label:'スペーシング',hint:'ポジションの広がり',active:true},
  ],
  attitude:[
    {key:'a_attitude',label:'練習態度',hint:'真剣に取り組めているか',active:true},
    {key:'a_henji',label:'返事・反応',hint:'指示への返事がはっきりしているか',active:true},
    {key:'a_voice',label:'声出し',hint:'プレー中・タイムアウト中の声',active:true},
    {key:'a_switch',label:'切り替え',hint:'ミス後の気持ちの切り替え',active:true},
    {key:'a_encourage',label:'仲間への声掛け',hint:'励ましや指示の声掛けができるか',active:true},
  ]
};
const SCORES={'◎':3,'○':2,'△':1,'×':0};
const SYMS=['◎','○','△','×'];
const SYM_CLS={'◎':'sel-maru-maru','○':'sel-maru','△':'sel-sankaku','×':'sel-batsu'};
const CAT_LBL={defense:'🛡 ディフェンス',offense:'🏀 オフェンス',attitude:'🔥 姿勢'};

let ITEMS,players,records,evalState={},evalMode='practice';

function saveToLocal(){
  const data={
    players,
    records,
    items:ITEMS,
    coachName:document.getElementById('coachName')?.value || ''
  };
  localStorage.setItem('sanoClubData', JSON.stringify(data));
}

function loadFromLocal(){
  try{
    const raw=localStorage.getItem('sanoClubData');
    if(!raw)return false;
    const d=JSON.parse(raw);
    players=d.players||[];
    records=d.records||[];
    ITEMS=d.items||JSON.parse(JSON.stringify(DEFAULT_ITEMS));
    setTimeout(()=>{
      const coach=document.getElementById('coachName');
      if(coach) coach.value=d.coachName || '';
    },0);
    return true;
  }catch(e){
    return false;
  }
}

function loadEmbedded(){
  try{
    const raw=document.getElementById('embedded-data').textContent.trim();
    if(raw&&raw!=='__EMBEDDED_DATA__'){
      const d=JSON.parse(raw);
      players=d.players||[];records=d.records||[];ITEMS=d.items||JSON.parse(JSON.stringify(DEFAULT_ITEMS));return;
    }
  }catch(e){}
  players=[];records=[];ITEMS=JSON.parse(JSON.stringify(DEFAULT_ITEMS));
}

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('evalDate').value=new Date().toISOString().slice(0,10);
  loadEmbedded();
  loadFromLocal();
  renderItemGrids();refreshAllDropdowns();renderPlayerList();renderHistory();renderRanking();drawRadar();

  const coachInput=document.getElementById('coachName');
  if(coachInput){
    coachInput.addEventListener('input',saveToLocal);
  }
  document.getElementById('histPlayer').addEventListener('change',renderHistory);
  document.getElementById('histMode').addEventListener('change',renderHistory);
  document.getElementById('rankMode').addEventListener('change',renderRanking);
  document.getElementById('rankCat').addEventListener('change',renderRanking);
});

// ===== 保存（HTMLダウンロード） =====
function saveHTML(){
  const data={players,records,items:ITEMS};
  const json=JSON.stringify(data);
  const html=document.documentElement.outerHTML;
  const updated=html.replace(
    /(<script id="embedded-data"[^>]*>)([\s\S]*?)(<\/script>)/,
    `$1\n${json}\n$3`
  );
  const blob=new Blob([updated],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`sano_hyoka_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
  showToast('💾 保存しました！新しいHTMLを使ってください');
}

function activeItems(cat){return ITEMS[cat].filter(i=>i.active);}
function setMode(m,btn){evalMode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function renderItemGrids(){
  ['defense','offense','attitude'].forEach(cat=>{
    const grid=document.getElementById('grid-'+cat);grid.innerHTML='';
    const items=activeItems(cat);
    if(!items.length){grid.innerHTML='<div class="empty-msg" style="padding:12px;font-size:12px">項目なし</div>';return;}
    items.forEach(item=>{
      const row=document.createElement('div');row.className='eval-row';
      row.innerHTML=`<div class="eval-label">${item.label}<small>${item.hint}</small></div>
        <div class="score-btns">${SYMS.map(s=>`<button class="score-btn" data-key="${item.key}" data-sym="${s}" onclick="setSym('${item.key}','${s}',this)">${s}</button>`).join('')}</div>`;
      grid.appendChild(row);
    });
  });
}

function setSym(key,sym,btn){
  if(evalState[key]===sym){delete evalState[key];}else{evalState[key]=sym;}
  document.querySelectorAll(`.score-btn[data-key="${key}"]`).forEach(b=>{
    b.className='score-btn';
    if(evalState[key]&&b.dataset.sym===evalState[key])b.classList.add(SYM_CLS[evalState[key]]);
  });
  updateSummary();
}

function calcCat(cat,st){
  st=st||evalState;const items=activeItems(cat);let t=0,c=0;
  items.forEach(it=>{if(st[it.key]!==undefined){t+=SCORES[st[it.key]];c++;}});
  return c===0?null:Math.round((t/(c*3))*100);
}
function calcTotal(st){
  st=st||evalState;let t=0,m=0;
  ['defense','offense','attitude'].forEach(cat=>{activeItems(cat).forEach(it=>{if(st[it.key]!==undefined){t+=SCORES[st[it.key]];m+=3;}});});
  return m===0?null:Math.round((t/m)*100);
}
function updateSummary(){
  [['defense','def'],['offense','off'],['attitude','att']].forEach(([cat,id])=>{
    const pct=calcCat(cat);
    document.getElementById('pct-'+id).textContent=pct===null?'--':pct+'%';
    document.getElementById('bar-'+id).style.width=(pct||0)+'%';
  });
  const tot=calcTotal();
  document.getElementById('pct-total').textContent=tot===null?'--':tot+'%';
  document.getElementById('bar-total').style.width=(tot||0)+'%';
}

function saveEval(){
  const pid=document.getElementById('evalPlayer').value;
  if(!pid){showToast('⚠ 選手を選んでください');return;}
  if(!Object.keys(evalState).length){showToast('⚠ 最低1項目入力してください');return;}
  const rec={
    id:Date.now().toString(),playerId:pid,
    date:document.getElementById('evalDate').value,
    mode:evalMode,
    coach:document.getElementById('coachName').value||'未設定',
    scores:{...evalState},
    comment:document.getElementById('evalComment').value,
    def:calcCat('defense'),off:calcCat('offense'),att:calcCat('attitude'),total:calcTotal()
  };
  records.unshift(rec);
  evalState={};renderItemGrids();document.getElementById('evalComment').value='';updateSummary();
  renderHistory();renderRanking();drawRadar();
  saveToLocal();showToast('✅ 記録しました！自動保存しました');
}

function refreshAllDropdowns(){
  ['evalPlayer','histPlayer','radarPlayer'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const prev=el.value;
    el.innerHTML=id==='histPlayer'?'<option value="">全員</option>':'';
    players.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=`${p.name}（${p.grade}年）`;el.appendChild(o);});
    if(prev)el.value=prev;
  });
}

function renderPlayerList(editingId=null){
  const list=document.getElementById('playerList');list.innerHTML='';
  if(!players.length){list.innerHTML='<div class="empty-msg">選手が登録されていません</div>';return;}
  players.forEach(p=>{
    const div=document.createElement('div');div.className='player-card';
    if(editingId===p.id){
      div.innerHTML=`<div class="player-avatar">${p.name.slice(0,1)}</div>
        <div class="player-edit-form">
          <input type="text" id="edit-name-${p.id}" value="${p.name}">
          <select id="edit-grade-${p.id}">${[1,2,3,4,5,6].map(g=>`<option value="${g}"${p.grade===g?' selected':''}>${g}年</option>`).join('')}</select>
          <button class="save-edit-btn" onclick="saveEditPlayer('${p.id}')">保存</button>
          <button class="cancel-edit-btn" onclick="renderPlayerList()">取消</button>
        </div>`;
    }else{
      div.innerHTML=`<div class="player-avatar">${p.name.slice(0,1)}</div>
        <div style="flex:1"><div class="player-card-name">${p.name}</div><div class="player-card-grade">${p.grade}年生</div></div>
        <button class="edit-btn" onclick="renderPlayerList('${p.id}')">✏️</button>
        <button class="del-btn" onclick="deletePlayer('${p.id}')">削除</button>`;
    }
    list.appendChild(div);
  });
}

function saveEditPlayer(id){
  const name=document.getElementById('edit-name-'+id).value.trim();
  const grade=parseInt(document.getElementById('edit-grade-'+id).value);
  if(!name){showToast('⚠ 名前を入力してください');return;}
  if(players.find(p=>p.name===name&&p.id!==id)){showToast('⚠ 同じ名前が既に存在します');return;}
  const p=players.find(p=>p.id===id);p.name=name;p.grade=grade;
  refreshAllDropdowns();renderPlayerList();saveToLocal();showToast(`✅ ${name} に更新しました`);
}

function addPlayer(){
  const name=document.getElementById('newName').value.trim();
  const grade=parseInt(document.getElementById('newGrade').value);
  if(!name){showToast('⚠ 名前を入力してください');return;}
  if(players.find(p=>p.name===name)){showToast('⚠ 同じ名前が既に存在します');return;}
  players.push({id:'p'+Date.now(),name,grade});
  document.getElementById('newName').value='';
  refreshAllDropdowns();renderPlayerList();saveToLocal();showToast(`✅ ${name} を追加しました`);
}

function deletePlayer(id){
  if(!confirm('この選手を削除しますか？'))return;
  players=players.filter(p=>p.id!==id);
  refreshAllDropdowns();renderPlayerList();saveToLocal();showToast('削除しました');
}

function renderHistory(){
  const pid=document.getElementById('histPlayer').value;
  const mode=document.getElementById('histMode').value;
  let recs=[...records];
  if(pid)recs=recs.filter(r=>r.playerId===pid);
  if(mode)recs=recs.filter(r=>r.mode===mode);
  const tbody=document.getElementById('histBody');
  document.getElementById('histEmpty').style.display=recs.length?'none':'block';
  tbody.innerHTML='';
  recs.forEach(r=>{
    const p=players.find(x=>x.id===r.playerId);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${r.date}</td><td>${p?p.name:'不明'}</td>
      <td>${r.mode==='game'?'<span class="chip chip-game">試合</span>':'<span class="chip chip-practice">練習</span>'}</td>
      <td style="font-size:10px;color:var(--gray)">${r.coach||'--'}</td>
      <td class="pct-cell ${pctClass(r.def)}">${r.def!==null?r.def+'%':'--'}</td>
      <td class="pct-cell ${pctClass(r.off)}">${r.off!==null?r.off+'%':'--'}</td>
      <td class="pct-cell ${pctClass(r.att)}">${r.att!==null?r.att+'%':'--'}</td>
      <td class="pct-cell ${pctClass(r.total)}" style="font-weight:900">${r.total!==null?r.total+'%':'--'}</td>
      <td><button class="del-btn" onclick="deleteRecord('${r.id}')">×</button></td>`;
    tbody.appendChild(tr);
  });
}

function deleteRecord(id){records=records.filter(r=>r.id!==id);saveToLocal();renderHistory();renderRanking();drawRadar();}
function pctClass(v){if(v===null)return'';return v>=70?'pct-hi':v>=40?'pct-mid':'pct-lo';}

function renderRanking(){
  const mode=document.getElementById('rankMode').value;
  const cat=document.getElementById('rankCat').value;
  const data=players.map(p=>{
    let recs=records.filter(r=>r.playerId===p.id);
    if(mode)recs=recs.filter(r=>r.mode===mode);
    const vals=recs.map(r=>cat==='total'?r.total:cat==='defense'?r.def:cat==='offense'?r.off:r.att).filter(v=>v!==null);
    if(!vals.length)return null;
    return{p,avg:Math.round(vals.reduce((a,b)=>a+b,0)/vals.length),count:recs.length};
  }).filter(Boolean).sort((a,b)=>b.avg-a.avg);
  const list=document.getElementById('rankList');list.innerHTML='';
  if(!data.length){list.innerHTML='<div class="empty-msg">データがありません</div>';return;}
  data.forEach((d,i)=>{
    const noClass=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const div=document.createElement('div');div.className='rank-item';
    div.innerHTML=`<div class="rank-no ${noClass}">${medal||'#'+(i+1)}</div>
      <div class="rank-info"><div class="rank-name">${d.p.name}</div><div class="rank-sub">${d.p.grade}年生　${d.count}回</div></div>
      <div class="rank-score">${d.avg}<span>%</span></div>`;
    list.appendChild(div);
  });
}

function drawRadar(){
  const pid=document.getElementById('radarPlayer').value;
  const canvas=document.getElementById('radarCanvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const recs=records.filter(r=>r.playerId===pid);
  if(!recs.length){ctx.fillStyle='#8899aa';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('データなし',W/2,H/2);return;}
  const avg=arr=>{const v=arr.filter(x=>x!==null);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0;};
  const axes=[
    {label:'ディフェンス',val:avg(recs.map(r=>r.def))},
    {label:'攻撃判断',val:avg(recs.map(r=>{if(!r.scores)return null;const v=['o_nodive','o_nearshot','o_lookaround'].filter(k=>r.scores[k]!==undefined).map(k=>SCORES[r.scores[k]]);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*100/3):null;}))},
    {label:'オフェンス',val:avg(recs.map(r=>r.off))},
    {label:'スペーシング',val:avg(recs.map(r=>{if(!r.scores||r.scores['o_spacing']===undefined)return null;return SCORES[r.scores['o_spacing']]*100/3;}))},
    {label:'姿勢',val:avg(recs.map(r=>r.att))},
    {label:'声',val:avg(recs.map(r=>{if(!r.scores)return null;const v=['d_voice','a_voice'].filter(k=>r.scores[k]!==undefined).map(k=>SCORES[r.scores[k]]);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*100/3):null;}))},
  ];
  const cx=W/2,cy=H/2,R=Math.min(W,H)/2-45,n=axes.length;
  for(let lv=1;lv<=3;lv++){const r=R*lv/3;ctx.beginPath();for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}ctx.closePath();ctx.strokeStyle='rgba(30,48,80,1)';ctx.lineWidth=1.5;ctx.stroke();}
  axes.forEach((_,i)=>{const a=Math.PI*2*i/n-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle='rgba(136,153,170,0.4)';ctx.lineWidth=1;ctx.stroke();});
  ctx.beginPath();axes.forEach((ax,i)=>{const a=Math.PI*2*i/n-Math.PI/2;const r=R*(ax.val||0)/100;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));});
  ctx.closePath();ctx.fillStyle='rgba(245,166,35,0.25)';ctx.fill();ctx.strokeStyle='#f5a623';ctx.lineWidth=2;ctx.stroke();
  axes.forEach((ax,i)=>{const a=Math.PI*2*i/n-Math.PI/2;const r=R*(ax.val||0)/100;ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),5,0,Math.PI*2);ctx.fillStyle='#f5a623';ctx.fill();});
  axes.forEach((ax,i)=>{const a=Math.PI*2*i/n-Math.PI/2;const lr=R+26;const x=cx+lr*Math.cos(a),y=cy+lr*Math.sin(a);ctx.fillStyle='#e8f0f8';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ax.label,x,y);ctx.fillStyle='#f5a623';ctx.font='bold 10px sans-serif';ctx.fillText(ax.val+'%',x,y+13);});
}

function renderItemSettings(){
  const wrap=document.getElementById('itemSettingsWrap');wrap.innerHTML='';
  ['defense','offense','attitude'].forEach(cat=>{
    const block=document.createElement('div');block.className='category-block';block.style.marginBottom='12px';
    const rows=ITEMS[cat].map((item,i)=>`
      <div class="eval-row" style="gap:8px">
        <label style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer">
          <input type="checkbox" ${item.active?'checked':''} onchange="toggleItem('${cat}',${i},this.checked)" style="width:18px;height:18px;accent-color:var(--gold)">
          <div><div style="font-size:13px;font-weight:700;${!item.active?'opacity:0.4;text-decoration:line-through':''}">${item.label}</div>
          <div style="font-size:10px;color:var(--gray)">${item.hint||''}</div></div>
        </label>
        <button class="del-btn" onclick="deleteItem('${cat}',${i})">削除</button>
      </div>`).join('');
    block.innerHTML=`<div class="category-header cat-${cat}">${CAT_LBL[cat]}</div><div class="eval-grid">${rows||'<div class="empty-msg" style="padding:10px;font-size:12px">項目なし</div>'}</div>`;
    wrap.appendChild(block);
  });
}

function toggleItem(cat,idx,val){ITEMS[cat][idx].active=val;renderItemGrids();evalState={};updateSummary();saveToLocal();showToast(val?'✅ 有効にしました':'非表示にしました');}
function deleteItem(cat,idx){if(!confirm(`「${ITEMS[cat][idx].label}」を削除しますか？`))return;ITEMS[cat].splice(idx,1);renderItemSettings();renderItemGrids();evalState={};updateSummary();saveToLocal();showToast('削除しました');}
function addItem(){
  const cat=document.getElementById('newItemCat').value;
  const label=document.getElementById('newItemLabel').value.trim();
  const hint=document.getElementById('newItemHint').value.trim();
  if(!label){showToast('⚠ 項目名を入力してください');return;}
  ITEMS[cat].push({key:cat.slice(0,1)+'_'+Date.now(),label,hint,active:true});
  document.getElementById('newItemLabel').value='';document.getElementById('newItemHint').value='';
  renderItemSettings();renderItemGrids();saveToLocal();showToast(`✅「${label}」を追加しました`);
}

function exportCSV(){
  const pid=document.getElementById('histPlayer').value;
  const mode=document.getElementById('histMode').value;
  let recs=[...records];
  if(pid)recs=recs.filter(r=>r.playerId===pid);
  if(mode)recs=recs.filter(r=>r.mode===mode);
  if(!recs.length){showToast('データがありません');return;}
  const header='日付,選手,種別,担当,ディフェンス%,オフェンス%,姿勢%,総合%,コメント';
  const rows=recs.map(r=>{const p=players.find(x=>x.id===r.playerId);return[r.date,p?p.name:'不明',r.mode==='game'?'試合':'練習',r.coach||'',r.def??'',r.off??'',r.att??'',r.total??'',`"${(r.comment||'').replace(/"/g,'""')}"`].join(',');});
  const blob=new Blob(['\uFEFF'+[header,...rows].join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`sano_hyoka_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  showToast('📥 CSV出力しました');
}

function showSection(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');btn.classList.add('active');
  if(name==='history')renderHistory();
  if(name==='rank'){renderRanking();drawRadar();}
  if(name==='settings')renderItemSettings();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
